<div class="page-container materials-container">
  <!-- Materials Header -->
  <div class="page-header">
    <h2><i class="fas fa-book"></i> Course Materials</h2>
    <p class="page-subtitle">Upload and manage course materials for RAG-powered student assistance</p>
  </div>

  <!-- Quick Stats Overview -->
  <div class="quick-stats" id="materialsStats">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="totalMaterials">-</div>
        <div class="stat-label">Total Materials</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="readyMaterials">-</div>
        <div class="stat-label">Ready</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-spinner"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="processingMaterials">-</div>
        <div class="stat-label">Processing</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-cubes"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="totalChunks">-</div>
        <div class="stat-label">Total Chunks</div>
      </div>
    </div>
  </div>

  <!-- Upload Section -->
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-upload"></i> Upload Material</h3>
      <p class="muted">Upload PDF, DOCX, or TXT files for your course</p>
    </div>
    <div class="card-body">
      <form id="uploadForm">
        <div class="form-row">
          <div class="form-group">
            <label for="courseCode">Course Code *</label>
            <input type="text" id="courseCode" class="input" placeholder="e.g., CS401" required>
          </div>
          <div class="form-group">
            <label for="courseName">Course Name *</label>
            <input type="text" id="courseName" class="input" placeholder="e.g., Introduction to Machine Learning" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="fileInput">Select File *</label>
          <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" style="display: none;">
            <label for="fileInput" class="file-input-label" id="fileLabel">
              <i class="fas fa-folder-open"></i> Click to select file or drag and drop
            </label>
          </div>
        </div>

        <button type="submit" id="uploadBtn" class="btn primary">
          <i class="fas fa-upload"></i> Upload Material
        </button>
        
        <!-- Upload Progress Bar -->
        <div id="uploadProgress" class="upload-progress" style="display: none;">
          <div class="progress-header">
            <span id="progressStatus">Uploading...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar-container">
            <div id="progressBar" class="progress-bar-fill"></div>
          </div>
          <div class="progress-details">
            <span id="progressDetails">Preparing upload...</span>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Materials List -->
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-list"></i> Uploaded Materials</h3>
      <button onclick="loadMaterials()" class="btn secondary">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>
    <div class="card-body">
      <div id="materialsTable">
        <div class="loading">Loading materials...</div>
      </div>
    </div>
  </div>
</div>

<style>
.file-input-wrapper {
  width: 100%;
}

.upload-progress {
  margin-top: 20px;
  padding: 15px;
  background: var(--bg-secondary);
  border-radius: 8px;
  border: 1px solid var(--border-color);
}

.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-weight: 600;
  color: var(--text-primary);
}

.progress-bar-container {
  width: 100%;
  height: 8px;
  background: var(--bg-tertiary, #f0f0f0);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4CAF50, #45a049);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 4px;
}

.progress-details {
  font-size: 0.85em;
  color: var(--text-secondary);
}

.file-input-label {
  display: block;
  padding: 20px;
  background: var(--bg-secondary);
  border: 2px dashed var(--border);
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  color: var(--text-secondary);
}

.file-input-label:hover {
  background: var(--bg-hover);
  border-color: var(--primary);
  color: var(--primary);
}

.file-input-label.drag-over {
  background: var(--card-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.file-input-label.has-file {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}

.file-input-label i {
  margin-right: 8px;
}

.materials-table {
  width: 100%;
  border-collapse: collapse;
}

.materials-table th,
.materials-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.materials-table th {
  background: var(--bg-secondary);
  font-weight: 600;
  color: var(--text-secondary);
}

.materials-table tr:hover {
  background: var(--bg-hover);
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.status-ready {
  background: var(--success-bg);
  color: var(--success);
}

.status-processing {
  background: var(--warning-bg);
  color: var(--warning);
}

.status-failed {
  background: var(--danger-bg);
  color: var(--danger);
}

.status-pending {
  background: var(--bg-secondary);
  color: var(--text-secondary);
}

.status-error {
  background: var(--danger-bg);
  color: var(--danger);
}

.material-actions {
  display: flex;
  gap: 8px;
}

.material-actions .btn {
  padding: 6px 12px;
  font-size: 12px;
}
</style>

<script>
window.loadStats = async function() {
  try {
    const data = await AdminApi.apiGet('/admin/materials/stats', true, 'Loading stats...');
    document.getElementById('totalMaterials').textContent = data.total_materials || 0;
    document.getElementById('readyMaterials').textContent = data.ready_materials || 0;
    document.getElementById('processingMaterials').textContent = data.processing_materials || 0;
    document.getElementById('totalChunks').textContent = data.total_chunks || 0;
  } catch (error) {
    console.error('Error loading stats:', error);
    if (window.showToast) window.showToast('Failed to load stats', 'error');
  }
}

window.loadMaterials = async function() {
  const container = document.getElementById('materialsTable');
  container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading materials...</div>';
  
  try {
    const data = await AdminApi.apiGet('/admin/materials', true, 'Loading materials...');
    const materials = data.materials || [];
    
    if (materials.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No materials uploaded yet</p></div>';
      return;
    }
    
    let html = '<div class="table-wrapper"><table class="materials-table"><thead><tr>';
    html += '<th><i class="fas fa-file-alt"></i> File</th>';
    html += '<th><i class="fas fa-book"></i> Course</th>';
    html += '<th><i class="fas fa-cubes"></i> Chunks</th>';
    html += '<th><i class="fas fa-info-circle"></i> Status</th>';
    html += '<th><i class="fas fa-calendar"></i> Uploaded</th>';
    html += '<th><i class="fas fa-cog"></i> Actions</th>';
    html += '</tr></thead><tbody>';
    
    materials.forEach(material => {
      html += '<tr>';
      html += `<td><i class="fas fa-file-alt"></i> ${material.original_filename}</td>`;
      html += `<td>${material.course_code} - ${material.course_name}</td>`;
      html += `<td>${material.chunk_count || 0}</td>`;
      html += `<td><span class="status-badge status-${material.status}">${material.status}</span></td>`;
      html += `<td>${new Date(material.upload_date).toLocaleDateString()}</td>`;
      html += `<td class="material-actions">`;
      
      if (material.status === 'pending') {
        html += `<button onclick="processMaterial(${material.material_id})" class="btn primary"><i class="fas fa-play"></i> Process</button>`;
      }
      
      html += `<button onclick="deleteMaterial(${material.material_id})" class="btn danger"><i class="fas fa-trash"></i> Delete</button>`;
      html += `</td></tr>`;
    });
    
    html += '</tbody></table></div>';
    container.innerHTML = html;
    
  } catch (error) {
    console.error('Error loading materials:', error);
    container.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>Error: ${error.message}</p></div>`;
  }
}

document.getElementById('fileInput').addEventListener('change', function() {
  const fileLabel = document.getElementById('fileLabel');
  if (this.files && this.files[0]) {
    fileLabel.innerHTML = `<i class="fas fa-check-circle"></i> ${this.files[0].name}`;
    fileLabel.classList.add('has-file');
  } else {
    fileLabel.innerHTML = '<i class="fas fa-folder-open"></i> Click to select file or drag and drop';
    fileLabel.classList.remove('has-file');
  }
});

// Wire drag and drop on the file label
(function() {
  const fileLabel = document.getElementById('fileLabel');
  const fileInput = document.getElementById('fileInput');

  ['dragenter', 'dragover'].forEach(evt => {
    fileLabel.addEventListener(evt, function(e) {
      e.preventDefault();
      e.stopPropagation();
      fileLabel.classList.add('drag-over');
    });
  });

  fileLabel.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    fileLabel.classList.remove('drag-over');
  });

  fileLabel.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    fileLabel.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileLabel.innerHTML = `<i class="fas fa-check-circle"></i> ${file.name}`;
    fileLabel.classList.add('has-file');
  });
})();

document.getElementById('uploadForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const courseCode = document.getElementById('courseCode').value;
  const courseName = document.getElementById('courseName').value;
  const fileLabel = document.getElementById('fileLabel');
  const progressContainer = document.getElementById('uploadProgress');
  const progressBar = document.getElementById('progressBar');
  const progressPercent = document.getElementById('progressPercent');
  const progressStatus = document.getElementById('progressStatus');
  const progressDetails = document.getElementById('progressDetails');
  
  if (!fileInput.files[0]) {
    if (window.showToast) window.showToast('Please select a file', 'error');
    return;
  }

  // Show progress bar
  uploadBtn.disabled = true;
  uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
  progressContainer.style.display = 'block';
  progressBar.style.width = '0%';
  progressPercent.textContent = '0%';
  progressStatus.textContent = 'Uploading file...';
  progressDetails.textContent = 'Preparing upload...';

  try {
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('course_code', courseCode);
    formData.append('course_name', courseName);

    // Simulate upload progress (since we can't track actual progress with fetch easily)
    let uploadProgress = 0;
    const progressInterval = setInterval(() => {
      if (uploadProgress < 90) {
        uploadProgress += 10;
        progressBar.style.width = uploadProgress + '%';
        progressPercent.textContent = uploadProgress + '%';
        progressDetails.textContent = `Uploading ${fileInput.files[0].name}...`;
      }
    }, 200);

    const uploadResponse = await fetch(`${AdminApi.API_BASE}/admin/materials/upload`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AdminApi.getToken()}` },
      body: formData
    });

    clearInterval(progressInterval);
    progressBar.style.width = '100%';
    progressPercent.textContent = '100%';
    progressDetails.textContent = 'Upload complete!';

    if (!uploadResponse.ok) {
      const errorData = await uploadResponse.json().catch(() => ({}));
      const errorMessage = errorData.detail || `Upload failed (${uploadResponse.status})`;
      throw new Error(errorMessage);
    }

    const uploadData = await uploadResponse.json();
    const materialId = uploadData.material_id;

    // Show processing stage
    progressStatus.textContent = 'Processing document...';
    progressDetails.textContent = 'Extracting text and creating embeddings...';
    progressBar.style.width = '0%';
    progressPercent.textContent = 'Processing';
    
    // Animate processing
    let processingProgress = 0;
    const processingInterval = setInterval(() => {
      if (processingProgress < 90) {
        processingProgress += 5;
        progressBar.style.width = processingProgress + '%';
      }
    }, 300);

    if (window.showToast) window.showToast('File uploaded! Processing...', 'success');
    uploadBtn.innerHTML = '<i class="fas fa-cog fa-spin"></i> Processing...';

    const processData = await AdminApi.apiPost(`/admin/materials/${materialId}/process`, {}, false);

    clearInterval(processingInterval);
    progressBar.style.width = '100%';
    progressPercent.textContent = '100%';
    
    // Show completion
    progressStatus.textContent = 'Complete!';
    progressDetails.textContent = `Successfully created ${processData.chunk_count} chunks`;
    progressBar.style.background = 'linear-gradient(90deg, #4CAF50, #45a049)';
    
    if (window.showToast) window.showToast(`Material processed! ${processData.chunk_count} chunks created`, 'success');

    // Reset form after delay
    setTimeout(() => {
      document.getElementById('uploadForm').reset();
      fileLabel.innerHTML = '<i class="fas fa-folder-open"></i> Click to select file or drag and drop';
      fileLabel.classList.remove('has-file');
      progressContainer.style.display = 'none';
      
      window.loadStats();
      window.loadMaterials();
    }, 2000);

  } catch (error) {
    console.error('Upload error:', error);
    progressStatus.textContent = 'Error!';
    progressDetails.textContent = error.message;
    progressBar.style.background = 'linear-gradient(90deg, #f44336, #d32f2f)';
    if (window.showToast) window.showToast('Upload failed: ' + error.message, 'error');
    
    setTimeout(() => {
      progressContainer.style.display = 'none';
    }, 3000);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload Material';
  }
});

window.processMaterial = async function(materialId) {
  try {
    await AdminApi.apiPost(`/admin/materials/${materialId}/process`, {}, true, 'Processing material...');
    if (window.showToast) window.showToast('Material processing started', 'success');
    setTimeout(() => { window.loadStats(); window.loadMaterials(); }, 2000);
  } catch (error) {
    console.error('Process error:', error);
    if (window.showToast) window.showToast('Processing failed: ' + error.message, 'error');
  }
}

window.deleteMaterial = async function(materialId) {
  if (!confirm('Are you sure you want to delete this material?')) return;
  
  try {
    await AdminApi.apiDelete(`/admin/materials/${materialId}`, true, 'Deleting material...');
    if (window.showToast) window.showToast('Material deleted', 'success');
    window.loadStats();
    window.loadMaterials();
  } catch (error) {
    console.error('Delete error:', error);
    if (window.showToast) window.showToast('Delete failed: ' + error.message, 'error');
  }
}

// Initialize materials page - called by router
window.initMaterialsPage = function() {
  console.log('Initializing materials page...');
  window.loadStats();
  window.loadMaterials();
};
</script>
